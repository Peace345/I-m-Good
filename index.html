<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Album</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
    }

    #player {
      padding: 20px;
    }

    #cover {
      width: 250px;
      height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 10px;
    }

    .song {
      padding: 10px;
      margin: 5px auto;
      width: 60%;
      background: #222;
      cursor: pointer;
      border-radius: 5px;
    }

    .song:hover {
      background: #333;
    }

    button {
      margin: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="player">

  <!-- BACK BUTTON -->
  <button onclick="goBack()">⬅ Back to Library</button>

  <!-- ALBUM INFO -->
  <h1 id="albumTitle">Album Title</h1>
  <img id="cover" src="" alt="cover">

  <!-- SONG LIST -->
  <div id="songs"></div>

</div>

<audio id="audio"></audio>

<script>

let currentAlbum = {
  name: "I'm Good",
  cover: "imgoodcover.png",
  songs: [
      { file: "introimgood.mp3", title: "Intro (I'm Good)", artist: "Kanye West, John Legend" },
      { file: "heavyhitters.mp3", title: "Heavy Hitters", artist: "Kanye West, GLC" },
      { file: "twowords.mp3", title: "Two Words", artist: "Kanye West, Freeway, Mos Def, The Boys Choir of Harlem" },
      { file: "iusedtoloveu.mp3", title: "Used To Love U", artist: "Kanye West, John Legend" },
      { file: "dropdeadgorgeous.mp3", title: "Drop Dead Gorgeous", artist: "Kanye West, Murphy Lee" },
      { file: "outthegame.mp3", title: "Out The Game", artist: "Kanye West, Consequence, John Legend" },
      { file: "stircrazy.mp3", title: "Stir Crazy", artist: "Kanye West, Eminem" }
  ]
};

// BACK BUTTON (PUT MAIN REPO LINK HERE)
function goBack() {
  window.location.href = "https://peace345.github.io/Ye-Unreleased-Archive/"; // <-- paste main library repo URL here
}

// LOAD ALBUM
document.getElementById("albumTitle").innerText = currentAlbum.name;
document.getElementById("cover").src = currentAlbum.cover;

buildSongs();

// BUILD SONG LIST
function buildSongs() {
  const songsDiv = document.getElementById("songs");
  songsDiv.innerHTML = "";

  currentAlbum.songs.forEach((song, i) => {
    const div = document.createElement("div");
    div.className = "song";

    div.innerHTML = `
      <strong>${song.title}</strong><br>
      <small>${song.artist || ""}</small>
    `;

    div.onclick = () => playSong(i);

    songsDiv.appendChild(div);
  });
}

// PLAY SONG
function playSong(i) {
  const song = currentAlbum.songs[i];

  const audio = document.getElementById("audio");
  audio.src = song.file;
  audio.play();
}

  function updateMediaSession(song, album) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title: song.title,
    artist: song.artist,
    album: album?.name || "",
    artwork: [
      {
        src: album?.cover || "",
        sizes: "512x512",
        type: "image/png"
      }
    ]
  });

  navigator.mediaSession.setActionHandler("play", () => {
    audio.play();
  });

  navigator.mediaSession.setActionHandler("pause", () => {
    audio.pause();
  });

  navigator.mediaSession.setActionHandler("previoustrack", () => {
    if (currentIndex > 0) {
      playSong(currentIndex - 1);
    }
  });

  navigator.mediaSession.setActionHandler("nexttrack", () => {
    if (currentIndex < currentAlbum.songs.length - 1) {
      playSong(currentIndex + 1);
    }
  });
}

</script>

</body>
</html>
